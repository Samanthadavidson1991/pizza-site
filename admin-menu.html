<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Management Dashboard</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f8f8; margin: 0; padding: 0; }
    .container { max-width: 900px; margin: 2rem auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 2rem; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
    th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
    th { background: #222; color: #fff; }
    tr:nth-child(even) { background: #f4f4f4; }
    .action-btn { padding: 0.3em 0.8em; border: none; border-radius: 4px; margin-right: 0.3em; cursor: pointer; }
    .edit { background: #2980b9; color: #fff; }
    .delete { background: #e74c3c; color: #fff; }
    .save { background: #2ecc40; color: #fff; }
    .cancel { background: #888; color: #fff; }
    .add-form { margin-top: 2em; }
    .add-form input { margin-right: 0.5em; padding: 0.4em; }
  </style>
</head>
<body>
  <div class="container">
    <div style="text-align:right; margin-bottom:1em;">
      <a href="admin-dashboard.html" style="margin-right:1em;">Order Dashboard</a>
    </div>
    <div id="login-box">
      <h2>Admin Login</h2>
      <input type="text" id="login-username" placeholder="Username" style="width:100%;padding:0.5rem;">
      <input type="password" id="login-password" placeholder="Password" style="width:100%;padding:0.5rem;margin-top:0.5rem;">
      <button id="login-btn" style="width:100%;margin-top:1rem;">Login</button>
      <p id="login-msg" style="color:red;"></p>
    </div>
    <div id="menu-section" style="display:none;">
      <h1>Menu Management</h1>
      <!-- Section/item management form from menu page -->
      <form id="add-item-form" class="menu-manager-form">
        <label for="section-select" class="section-label">Choose Section:</label>
        <select id="section-select" name="section" class="section-select">
          <!-- Options will be populated by JS -->
        </select>
        <input type="text" id="new-section-name" name="new-section" placeholder="New Section Name" class="new-section-input" />
        <br><br>
        <label for="item-name"><b>Item Name:</b></label>
        <input type="text" id="item-name" name="item-name" required>
        <label for="item-price" class="price-label"><b>Price (£):</b></label>
        <input type="number" id="item-price" name="item-price" step="0.01" required>
        <br><br>
        <label for="item-desc"><b>Description:</b></label>
        <input type="text" id="item-desc" name="item-desc" class="desc-input">
        <label for="item-image" class="image-label"><b>Image (URL):</b></label>
        <input type="text" id="item-image" name="item-image" class="image-input">
        <br><br>
        <button type="submit">Add Item</button>
      </form>
      <table id="menu-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Price (£)</th>
            <th>Image</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button id="logout-btn" type="button" class="action-btn cancel" style="float:right;">Logout</button>
    </div>
  </div>
  <script>
  // Use backend for menu management
  let menu = [];
    let editingId = null;
    let currentUser = localStorage.getItem('adminUser') || '';
    function showLogin(show) {
      document.getElementById('login-box').style.display = show ? '' : 'none';
      document.getElementById('menu-section').style.display = show ? 'none' : '';
    }
    async function login() {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const msg = document.getElementById('login-msg');
      msg.textContent = '';
      try {
        const res = await fetch(`${BACKEND}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminUser', username);
          currentUser = username;
          showLogin(false);
          loadMenu();
        } else {
          msg.textContent = data.error || 'Login failed.';
        }
      } catch (e) {
        msg.textContent = 'Login error.';
      }
    }
    document.getElementById('login-btn').onclick = login;
    document.getElementById('logout-btn').onclick = function() {
      localStorage.removeItem('adminUser');
      currentUser = '';
      showLogin(true);
    };
    if (currentUser) {
      showLogin(false);
    }
    async function loadMenu() {
      const res = await fetch(`${BACKEND}/menu`);
      menu = await res.json();
      renderMenu();
    }
    function renderMenu() {
      const tbody = document.querySelector('#menu-table tbody');
      tbody.innerHTML = '';
      menu.forEach(item => {
        const tr = document.createElement('tr');
        if (editingId === item.id) {
          tr.innerHTML = `
            <td><input type="text" id="edit-name" value="${item.name}"></td>
            <td><input type="text" id="edit-desc" value="${item.description}"></td>
            <td><input type="number" id="edit-price" value="${item.price}" step="0.01"></td>
            <td><input type="text" id="edit-image" value="${item.image || ''}"></td>
            <td>
              <button class="action-btn save" onclick="saveEdit(${item.id})">Save</button>
              <button class="action-btn cancel" onclick="cancelEdit()">Cancel</button>
            </td>
          `;
        } else {
          tr.innerHTML = `
            <td>${item.name}</td>
            <td>${item.description}</td>
            <td>${item.price.toFixed(2)}</td>
            <td>${item.image ? `<img src='${item.image}' alt='' style='height:40px;'>` : ''}</td>
            <td>
              <button class="action-btn edit" onclick="editItem(${item.id})">Edit</button>
              <button class="action-btn delete" onclick="deleteItem(${item.id})">Delete</button>
            </td>
          `;
        }
        tbody.appendChild(tr);
      });
    }
    function editItem(id) {
      editingId = id;
      renderMenu();
    }
    function cancelEdit() {
      editingId = null;
      renderMenu();
    }
    async function saveEdit(id) {
      if (!currentUser) return alert('Please log in.');
      const name = document.getElementById('edit-name').value;
      const description = document.getElementById('edit-desc').value;
      const price = parseFloat(document.getElementById('edit-price').value);
      const image = document.getElementById('edit-image').value;
      await fetch(`${BACKEND}/menu/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description, price, image, username: currentUser })
      });
      editingId = null;
      await loadMenu();
    }
    async function deleteItem(id) {
      if (!currentUser) return alert('Please log in.');
      if (!confirm('Delete this menu item?')) return;
      await fetch(`${BACKEND}/menu/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: currentUser })
      });
      await loadMenu();
    }
    document.getElementById('add-form').onsubmit = async function(e) {
      e.preventDefault();
      if (!currentUser) return alert('Please log in.');
      const name = document.getElementById('add-name').value;
      const description = document.getElementById('add-desc').value;
      const price = parseFloat(document.getElementById('add-price').value);
      const image = document.getElementById('add-image').value;
      await fetch(`${BACKEND}/menu`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description, price, image, username: currentUser })
      });
      document.getElementById('add-form').reset();
      await loadMenu();
    };
    if (currentUser) loadMenu();
  </script>
</body>
</html>
