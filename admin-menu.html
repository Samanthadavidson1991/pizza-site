<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Management Dashboard</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f8f8; margin: 0; padding: 0; }
    .container { max-width: 900px; margin: 2rem auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 2rem; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
    th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
    th { background: #222; color: #fff; }
    tr:nth-child(even) { background: #f4f4f4; }
    .action-btn { padding: 0.3em 0.8em; border: none; border-radius: 4px; margin-right: 0.3em; cursor: pointer; }
    .edit { background: #2980b9; color: #fff; }
    .delete { background: #e74c3c; color: #fff; }
    .save { background: #2ecc40; color: #fff; }
    .cancel { background: #888; color: #fff; }
    .add-form { margin-top: 2em; }
    .add-form input { margin-right: 0.5em; padding: 0.4em; }
  </style>
</head>
<body>
  <div class="container">
    <div style="text-align:right; margin-bottom:1em;">
      <a href="admin-dashboard.html" style="margin-right:1em;">Order Dashboard</a>
    </div>
    <div id="login-box">
      <h2>Admin Login</h2>
      <input type="text" id="login-username" placeholder="Username" style="width:100%;padding:0.5rem;">
      <input type="password" id="login-password" placeholder="Password" style="width:100%;padding:0.5rem;margin-top:0.5rem;">
      <button id="login-btn" style="width:100%;margin-top:1rem;">Login</button>
      <p id="login-msg" style="color:red;"></p>
    </div>
    <div id="menu-section" style="display:none;">
      <h1>Menu Management</h1>
      <table id="menu-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Price (£)</th>
            <th>Image</th>
            <th>Actions</th>
            <th>Options</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <form class="add-form" id="add-form">
        <input type="text" id="add-name" placeholder="Name" required>
        <input type="text" id="add-desc" placeholder="Description" required>
        <input type="number" id="add-price" placeholder="Price" step="0.01" required>
        <input type="text" id="add-image" placeholder="Image filename (optional)">
        <input type="text" id="add-toppings" placeholder="Toppings (comma separated)">
        <input type="number" id="add-extra-topping-price" placeholder="Extra topping price (optional)" step="0.01">
        <select id="add-section" required>
          <option value="">Select Section</option>
          <option value="PIZZA'S">PIZZA'S</option>
          <option value="SALADS">SALADS</option>
          <option value="DRINKS">DRINKS</option>
          <option value="SIDES">SIDES</option>
          <option value="DESSERTS">DESSERTS</option>
        </select>
        <button type="submit" class="action-btn save">Add Item</button>
        <button id="logout-btn" type="button" class="action-btn cancel" style="float:right;">Logout</button>
      </form>
    </div>
  </div>
  <script>
    const BACKEND = 'https://pizza-site-c8t6.onrender.com';
    let menu = [];
    let editingId = null;
    let currentUser = localStorage.getItem('adminUser') || '';
    function showLogin(show) {
      document.getElementById('login-box').style.display = show ? '' : 'none';
      document.getElementById('menu-section').style.display = show ? 'none' : '';
    }
    async function login() {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const msg = document.getElementById('login-msg');
      msg.textContent = '';
      try {
        const res = await fetch(`${BACKEND}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminUser', username);
          currentUser = username;
          showLogin(false);
          loadMenu();
        } else {
          msg.textContent = data.error || 'Login failed.';
        }
      } catch (e) {
        msg.textContent = 'Login error.';
      }
    }
    document.getElementById('login-btn').onclick = login;
    document.getElementById('logout-btn').onclick = function() {
      localStorage.removeItem('adminUser');
      currentUser = '';
      showLogin(true);
    };
    if (currentUser) {
      showLogin(false);
    }
    async function loadMenu() {
      const res = await fetch(`${BACKEND}/menu`);
      menu = await res.json();
      renderMenu();
    }
    function renderMenu() {
      const tbody = document.querySelector('#menu-table tbody');
      tbody.innerHTML = '';
      menu.forEach(item => {
        const tr = document.createElement('tr');
        let optionsHtml = '';
        // Allow options for all items
        optionsHtml = `<div id="options-list-${item.id}"></div>
          <input type="text" id="option-label-input-${item.id}" placeholder="Option label" style="width: 40%;">
          <input type="number" id="option-price-input-${item.id}" placeholder="Price" step="0.01" style="width: 30%;">
          <button class="action-btn save" onclick="addOption(${item.id})">Add</button>`;
        if (editingId === item.id) {
          tr.innerHTML = `
            <td><input type="text" id="edit-name" value="${item.name}"></td>
            <td><input type="text" id="edit-desc" value="${item.description}"></td>
            <td><input type="number" id="edit-price" value="${item.price}" step="0.01"></td>
            <td><input type="text" id="edit-image" value="${item.image || ''}"></td>
            <td>
              <button class="action-btn save" onclick="saveEdit(${item.id})">Save</button>
              <button class="action-btn cancel" onclick="cancelEdit()">Cancel</button>
            </td>
            <td>${optionsHtml}</td>
          `;
        } else {
          tr.innerHTML = `
            <td>${item.name}</td>
            <td>${item.description}</td>
            <td>${item.price.toFixed(2)}</td>
            <td>${item.image ? `<img src='${item.image}' alt='' style='height:40px;'>` : ''}</td>
            <td>
              <button class="action-btn edit" onclick="editItem(${item.id})">Edit</button>
              <button class="action-btn delete" onclick="deleteItem(${item.id})">Delete</button>
            </td>
            <td>${optionsHtml}</td>
          `;
        }
        tbody.appendChild(tr);
        // Render options if present
        if (item.options) {
          setTimeout(() => renderOptions(item.id, item.options), 0);
        }
      });
    }

    function renderOptions(itemId, options) {
      const listDiv = document.getElementById(`options-list-${itemId}`);
      if (!listDiv) return;
      listDiv.innerHTML = options.map((opt, idx) => {
        let label = typeof opt === 'object' ? opt.label : opt;
        let price = typeof opt === 'object' && opt.price !== undefined ? ` (£${parseFloat(opt.price).toFixed(2)})` : '';
        return `<span style='display:inline-block;margin:2px 6px 2px 0;padding:2px 8px;background:#eee;border-radius:12px;'>${label}${price} <button onclick='removeOption(${itemId},${idx})' style='background:#e74c3c;color:#fff;border:none;border-radius:8px;padding:0 6px;cursor:pointer;'>x</button></span>`;
      }).join('');
    }

    async function addOption(itemId) {
      const labelInput = document.getElementById(`option-label-input-${itemId}`);
      const priceInput = document.getElementById(`option-price-input-${itemId}`);
      const label = labelInput.value.trim();
      const price = priceInput.value.trim();
      if (!label) return;
      const item = menu.find(i => i.id === itemId);
      if (!item.options) item.options = [];
      let optionObj = label;
      if (price) {
        optionObj = { label, price: parseFloat(price) };
      }
      item.options.push(optionObj);
      await fetch(`${BACKEND}/menu/${itemId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...item, username: currentUser })
      });
      labelInput.value = '';
      priceInput.value = '';
      await loadMenu();
    }

    async function removeOption(itemId, idx) {
      const item = menu.find(i => i.id === itemId);
      if (!item.options) return;
      item.options.splice(idx, 1);
      await fetch(`${BACKEND}/menu/${itemId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...item, username: currentUser })
      });
      await loadMenu();
    }
    function editItem(id) {
      editingId = id;
      renderMenu();
    }
    function cancelEdit() {
      editingId = null;
      renderMenu();
    }
    async function saveEdit(id) {
      if (!currentUser) return alert('Please log in.');
      const name = document.getElementById('edit-name').value;
      const description = document.getElementById('edit-desc').value;
      const price = parseFloat(document.getElementById('edit-price').value);
      const image = document.getElementById('edit-image').value;
      await fetch(`${BACKEND}/menu/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description, price, image, username: currentUser })
      });
      editingId = null;
      await loadMenu();
    }
    async function deleteItem(id) {
      if (!currentUser) return alert('Please log in.');
      if (!confirm('Delete this menu item?')) return;
      await fetch(`${BACKEND}/menu/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: currentUser })
      });
      await loadMenu();
    }
    document.getElementById('add-form').onsubmit = async function(e) {
      e.preventDefault();
      if (!currentUser) return alert('Please log in.');
      const name = document.getElementById('add-name').value;
      const description = document.getElementById('add-desc').value;
      const price = parseFloat(document.getElementById('add-price').value);
      const image = document.getElementById('add-image').value;
      const toppingsRaw = document.getElementById('add-toppings').value;
      const toppings = toppingsRaw ? toppingsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
      const extraToppingPriceRaw = document.getElementById('add-extra-topping-price').value;
      const extraToppingPrice = extraToppingPriceRaw ? parseFloat(extraToppingPriceRaw) : undefined;
      const section = document.getElementById('add-section').value;
      await fetch(`${BACKEND}/menu`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description, price, image, toppings, extraToppingPrice, section, username: currentUser })
      });
      document.getElementById('add-form').reset();
      await loadMenu();
    };
    if (currentUser) loadMenu();
  </script>
</body>
</html>
