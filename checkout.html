<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="css pizza website take 1.css">
  <link rel="stylesheet" href="checkout.css">
  <link rel="stylesheet" href="css menu pizza website take 1.css">
    <!-- Stripe.js -->
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <header>
    <h1 class="main-heading no-underline">Inspired by Naples, perfected at None Go Bye.</h1>
    <nav class="main-nav">
  <a href="pizza website take 1.html">Home</a>
  <a href="index.html">Menu</a>
  <a href="checkout.html">Checkout</a>
  <a href="allergens.html">Allergens</a>
    </nav>
  </header>
  <main>
    <section id="checkout-cart">
      <h2>Your Selected Items</h2>
      <div id="cart-items"></div>
  <div id="order-details" class="order-details-box">
  <h3 class="no-margin-top">Order Details</h3>
        <label><input type="radio" name="orderType" value="collection" checked> Collection</label>
  <label class="ml-1em"><input type="radio" name="orderType" value="delivery"> Delivery</label><br><br>
  <input type="text" id="customer-name" placeholder="Your Name" class="input-wide mb-halfrem"><br>
  <input type="text" id="customer-phone" placeholder="Phone Number" class="input-wide mb-halfrem"><br>
  <input type="email" id="customer-email" placeholder="Email (for receipt)" class="input-wide mb-halfrem"><br>
  <textarea id="order-comments" placeholder="Comments (e.g. allergies, delivery notes)" class="input-wide mb-halfrem minheight-60"></textarea><br>
        <div id="delivery-fields">
          <input type="text" id="customer-address" placeholder="Address (for delivery)" class="input-wide mb-halfrem"><br>
          <input type="text" id="customer-postcode" placeholder="Postcode" class="input-wide mb-halfrem"><br>
        </div>
  <label for="order-time-slot" class="label-bold mt-halfrem block">Choose a time slot:</label>
  <select id="order-time-slot" class="input-wide">
          <option value="">Select a time...</option>
          <option value="17:00-17:30">17:00 - 17:30</option>
          <option value="17:30-18:00">17:30 - 18:00</option>
          <option value="18:00-18:30">18:00 - 18:30</option>
          <option value="18:30-19:00">18:30 - 19:00</option>
          <option value="19:00-19:30">19:00 - 19:30</option>
          <option value="19:30-20:00">19:30 - 20:00</option>
          <option value="20:00-20:30">20:00 - 20:30</option>
          <option value="20:30-21:00">20:30 - 21:00</option>
          <option value="21:00-21:30">21:00 - 21:30</option>
          <option value="21:30-22:00">21:30 - 22:00</option>
        </select>
      </div>
      <p id="cart-total"><strong>Total: £0.00</strong></p>
  <button class="menu-item pay-card">Pay with Card</button>
  <button class="menu-item pay-cash">Pay with Cash</button>
        <div id="voucher-section" class="voucher-section">
          <input type="text" id="voucher-input" placeholder="Enter voucher code" class="voucher-input">
          <button class="menu-item ml-halfrem" id="apply-voucher-btn">Apply</button>
          <div id="voucher-message" class="voucher-message"></div>
        </div>
    </section>
  </main>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    let total = 0;
    const cartItemsDiv = document.getElementById('cart-items');
    // Group items by name and price
    const grouped = {};
    cart.forEach(function(item) {
      const key = `${item.name}||${item.price}`;
      if (!grouped[key]) {
        grouped[key] = { ...item, count: 1 };
      } else {
        grouped[key].count++;
      }
      total += item.price;
    });
    Object.values(grouped).forEach(function(item) {
      const div = document.createElement('div');
      div.className = 'menu-item';
      div.innerHTML = `${item.name} - £${item.price.toFixed(2)}` + (item.count > 1 ? ` x${item.count}` : '') +
        ` <button class='remove-btn' style='margin-left:1em;'>&minus;</button> <button class='add-btn'>+</button>`;
      // Remove one instance
      div.querySelector('.remove-btn').onclick = function() {
        // Remove one instance from cart
        let idx = cart.findIndex(i => i.name === item.name && i.price === item.price);
        if (idx !== -1) {
          cart.splice(idx, 1);
          localStorage.setItem('cart', JSON.stringify(cart));
          location.reload();
        }
      };
      // Add one instance
      div.querySelector('.add-btn').onclick = function() {
        cart.push({ name: item.name, price: item.price });
        localStorage.setItem('cart', JSON.stringify(cart));
        location.reload();
      };
      cartItemsDiv.appendChild(div);
    });
    document.getElementById('cart-total').innerHTML = `<strong>Total: £${total.toFixed(2)}</strong>`;

    // Voucher logic
    let discount = 0;
    let voucherApplied = false;
    let appliedVoucher = localStorage.getItem('appliedVoucher') || '';
    const voucherInput = document.getElementById('voucher-input');
    const voucherMsg = document.getElementById('voucher-message');
    const validVouchers = {
      'PIZZA10': 0.10, // 10% off
      'FREESIDE': 2.00 // £2 off
    };
    function updateTotalDisplay() {
      let displayTotal = total;
      if (discount > 0) {
        displayTotal = Math.max(0, total - discount);
        document.getElementById('cart-total').innerHTML = `<strong>Total: £${displayTotal.toFixed(2)}</strong> <span style='color:green;'>(Discount applied!)</span>`;
      } else {
        document.getElementById('cart-total').innerHTML = `<strong>Total: £${displayTotal.toFixed(2)}</strong>`;
      }
    }
    function applyVoucher(code) {
      let codeUpper = code.trim().toUpperCase();
      if (validVouchers[codeUpper]) {
        if (codeUpper === 'PIZZA10') {
          discount = total * validVouchers[codeUpper];
        } else if (codeUpper === 'FREESIDE') {
          discount = validVouchers[codeUpper];
        }
        voucherApplied = true;
        appliedVoucher = codeUpper;
        localStorage.setItem('appliedVoucher', codeUpper);
        voucherMsg.textContent = 'Voucher applied!';
        voucherMsg.style.color = 'green';
      } else {
        discount = 0;
        voucherApplied = false;
        appliedVoucher = '';
        localStorage.removeItem('appliedVoucher');
        voucherMsg.textContent = 'Invalid voucher code.';
        voucherMsg.style.color = 'red';
      }
      updateTotalDisplay();
    }
    document.getElementById('apply-voucher-btn').onclick = function() {
      applyVoucher(voucherInput.value);
    };
    // If voucher was already applied, re-apply on load
    if (appliedVoucher) {
      voucherInput.value = appliedVoucher;
      applyVoucher(appliedVoucher);
    } else {
      updateTotalDisplay();
    }
    // Stripe payment logic
    // Show/hide delivery fields based on order type
    function toggleDeliveryFields() {
      const deliveryFields = document.getElementById('delivery-fields');
      const orderType = document.querySelector('input[name="orderType"]:checked').value;
      deliveryFields.style.display = orderType === 'delivery' ? 'block' : 'none';
    }
    document.querySelectorAll('input[name="orderType"]').forEach(radio => {
      radio.addEventListener('change', toggleDeliveryFields);
    });
    toggleDeliveryFields();

    document.getElementById('pay-with-card').onclick = async function() {
      // Get order details
  const orderType = document.querySelector('input[name="orderType"]:checked').value;
  const customerName = document.getElementById('customer-name').value;
  const customerPhone = document.getElementById('customer-phone').value;
  const customerEmail = document.getElementById('customer-email').value;
  const orderComments = document.getElementById('order-comments').value;
  const customerAddress = document.getElementById('customer-address').value;
  const customerPostcode = document.getElementById('customer-postcode').value;
  const orderTimeSlot = document.getElementById('order-time-slot').value;
      // Calculate total after voucher
      let total = 0;
      cart.forEach(item => total += item.price);
      let discount = 0;
      let appliedVoucher = localStorage.getItem('appliedVoucher') || '';
      if (appliedVoucher === 'PIZZA10') discount = total * 0.10;
      if (appliedVoucher === 'FREESIDE') discount = 2.00;
      let finalTotal = Math.max(0, total - discount);

      // Send cart and total to backend to create Stripe Checkout session
      const response = await fetch('http://localhost:4242/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          cart: cart,
          total: finalTotal,
          orderType,
          customerName,
          customerPhone,
          customerAddress,
          customerPostcode,
          orderTimeSlot,
          customerEmail,
          orderComments
        })
      });
      const data = await response.json();
      if (data.id) {
        const stripe = Stripe('pk_test_REPLACE_WITH_YOUR_PUBLISHABLE_KEY');
        stripe.redirectToCheckout({ sessionId: data.id });
      } else {
        alert('Payment error: ' + (data.error || 'Could not start payment.'));
      }
    }

    // Cash payment logic
  document.getElementById('pay-with-cash').onclick = async function() {
      // Get order details
  const orderType = document.querySelector('input[name="orderType"]:checked').value;
  const customerName = document.getElementById('customer-name').value;
  const customerPhone = document.getElementById('customer-phone').value;
  const customerEmail = document.getElementById('customer-email').value;
  const orderComments = document.getElementById('order-comments').value;
  const customerAddress = document.getElementById('customer-address').value;
  const customerPostcode = document.getElementById('customer-postcode').value;
  const orderTimeSlot = document.getElementById('order-time-slot').value;
      alert('DEBUG: Cash button clicked');
      // Calculate total after voucher
      let total = 0;
      cart.forEach(item => total += item.price);
      let discount = 0;
      let appliedVoucher = localStorage.getItem('appliedVoucher') || '';
      if (appliedVoucher === 'PIZZA10') discount = total * 0.10;
      if (appliedVoucher === 'FREESIDE') discount = 2.00;
      let finalTotal = Math.max(0, total - discount);
      alert('DEBUG: About to send order. Total: ' + finalTotal);
      try {
        const response = await fetch('http://localhost:4242/cash-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cart: cart,
            total: finalTotal,
            orderType,
            customerName,
            customerPhone,
            customerAddress,
            customerPostcode,
            orderTimeSlot,
            customerEmail,
            orderComments
          })
        });
        alert('DEBUG: Got response, status: ' + response.status);
        const data = await response.json();
        alert('DEBUG: Response JSON: ' + JSON.stringify(data));
        if (data.success) {
          alert('Thank you! Please pay with cash when you collect your order.');
          localStorage.removeItem('cart');
          localStorage.removeItem('appliedVoucher');
          window.location.href = 'pizza website take 1.html';
        } else {
          alert('Could not save your order. Please try again.');
        }
      } catch (err) {
        alert('DEBUG: Error occurred: ' + err);
        console.error('Cash order error:', err);
      }
    }
  });

  </script>
